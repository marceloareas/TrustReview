version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432" # Host port 5433 maps to container 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 2s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: trustreview
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      # Mapeia a pasta interna do contêiner (/app/uploads) 
      # para uma nova pasta chamada 'uploads_api' no seu projeto local (host).
      - ./uploads:/app/uploads

  app:
    build: ./trustreview-app/app
    container_name: trustreview_app
    env_file:
      - ./trustreview-app/app/.env
    restart: always
    depends_on:
      - api
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1

  nginx:
    build: ./trustreview-app/nginx
    container_name: nginx-trustreview
    ports:
      - "80:80"
    volumes:
      - ./trustreview-app/app/dist:/usr/share/nginx/html
    depends_on:
      - app
      - api
      - db

volumes:
  postgres_data:
